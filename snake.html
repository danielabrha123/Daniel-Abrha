<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Snake Game</title>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */

body{
    background:tomato;
    min-height:100vh;
    color:white;
    overflow-x:hidden;
}


/* MAIN */

.main{
    width:100%;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* GAME CONTAINER */

.game-container{
    width:95%;
    max-width:900px;
    text-align:center;
}

/* TITLE */

.title{
    margin-bottom:20px;
    border:4px inset lightgreen;
    background:lightblue;
    color:black;
    padding:15px;
    border-radius:15px;
}

/* TOP BAR */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;

    margin-bottom:15px;
}

/* SCORE BOX */

.score-box{
    background:lightgreen;
    padding:10px 20px;
    border-radius:15px;
    color:black;
    font-size:1.2rem;
    font-weight:bold;
}

/* BUTTON */

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:lightblue;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#00ffaa;
}

/* CANVAS */

canvas{
    width:100%;
    max-width:800px;

    background:#111;

    border:4px solid #00ffcc;

    border-radius:20px;

    box-shadow:0 0 30px #00ffcc;
}

/* MOBILE CONTROLS */

.controls{
    margin-top:20px;

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    gap:10px;
}

.row{
    display:flex;
    gap:10px;
}

.control-btn{
    width:60px;
    height:60px;

    border-radius:15px;

    font-size:2rem;

    background:rgba(255,255,255,0.1);

    color:white;

    border:2px solid #00ffcc;
}

.control-btn:active{
    background:#00ffcc;
    color:black;
}

/* GAME OVER */

.game-over{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.8);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    font-size:2rem;

    z-index:9999;
}

.game-over button{
    margin-top:20px;
}

/* MOBILE */

@media(max-width:768px){

    li a,
    .drbn{
        font-size:18px;
        padding:12px 14px;
    }

    .controls{
        display:flex;
    }

    .title{
        font-size:2rem;
    }
}

</style>
</head>

<body>
<!-- MAIN -->

<div class="main">

<div class="game-container">

    <h1 class="title">🐍 My First Snake Game</h1>

    <div class="top-bar">

        <div class="score-box">
            Score:
            <span id="score">0</span>
        </div>

        <div class="score-box">
            High Score:
            <span id="highScore">0</span>
        </div>

        <button onclick="restartGame()">
            Restart
        </button>

    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- MOBILE CONTROLS -->

    <div class="controls">

        <button class="control-btn"
        onclick="changeDirection('up')">
        ⬆
        </button>

        <div class="row">

            <button class="control-btn"
            onclick="changeDirection('left')">
            ⬅
            </button>

            <button class="control-btn"
            onclick="changeDirection('down')">
            ⬇
            </button>

            <button class="control-btn"
            onclick="changeDirection('right')">
            ➡
            </button>

        </div>

    </div>

</div>

</div>

<!-- GAME OVER -->

<div class="game-over" id="gameOver">

    <h1>💀 Game Over</h1>

    <p id="finalScore"></p>

    <button onclick="restartGame()">
        Play Again
    </button>

</div>

<script>

const canvas = document.getElementById("gameCanvas");

const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");

const highScoreEl = document.getElementById("highScore");

const gameOverScreen =
document.getElementById("gameOver");

const finalScore =
document.getElementById("finalScore");

const gridSize = 20;

let snake = [
    {x:200,y:200}
];

let direction = "right";

let food = randomFood();

let score = 0;

let speed = 120;

let gameRunning = true;

let highScore =
localStorage.getItem("snakeHighScore") || 0;

highScoreEl.textContent = highScore;

/* RANDOM FOOD */

function randomFood(){

    return{

        x:
        Math.floor(
        Math.random() *
        (canvas.width / gridSize)
        ) * gridSize,

        y:
        Math.floor(
        Math.random() *
        (canvas.height / gridSize)
        ) * gridSize
    };
}

/* DRAW SNAKE */

function drawSnake(){

    snake.forEach((part,index)=>{

        let gradient =
        ctx.createLinearGradient(
            part.x,
            part.y,
            part.x + gridSize,
            part.y + gridSize
        );

        gradient.addColorStop(0,"#00ffcc");

        gradient.addColorStop(1,"#0066ff");

        ctx.fillStyle = gradient;

        ctx.fillRect(
            part.x,
            part.y,
            gridSize,
            gridSize
        );

        ctx.strokeStyle = "#111";

        ctx.strokeRect(
            part.x,
            part.y,
            gridSize,
            gridSize
        );

        if(index === 0){

            ctx.fillStyle = "white";

            ctx.beginPath();

            ctx.arc(
                part.x + 5,
                part.y + 5,
                2,
                0,
                Math.PI * 2
            );

            ctx.fill();

            ctx.beginPath();

            ctx.arc(
                part.x + 15,
                part.y + 5,
                2,
                0,
                Math.PI * 2
            );

            ctx.fill();
        }
    });
}

/* DRAW FOOD */

function drawFood(){

    ctx.beginPath();

    ctx.fillStyle = "#ff0044";

    ctx.shadowColor = "#ff0044";

    ctx.shadowBlur = 20;

    ctx.arc(
        food.x + gridSize/2,
        food.y + gridSize/2,
        gridSize/2,
        0,
        Math.PI * 2
    );

    ctx.fill();

    ctx.shadowBlur = 0;
}

/* MOVE SNAKE */

function moveSnake(){

    const head = {...snake[0]};

    switch(direction){

        case "up":
            head.y -= gridSize;
            break;

        case "down":
            head.y += gridSize;
            break;

        case "left":
            head.x -= gridSize;
            break;

        case "right":
            head.x += gridSize;
            break;
    }

    /* WALL COLLISION */

    if(
        head.x < 0 ||
        head.y < 0 ||
        head.x >= canvas.width ||
        head.y >= canvas.height
    ){
        gameOver();
        return;
    }

    /* SELF COLLISION */

    for(let part of snake){

        if(
            head.x === part.x &&
            head.y === part.y
        ){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    /* EAT FOOD */

    if(
        head.x === food.x &&
        head.y === food.y
    ){

        score++;

        scoreEl.textContent = score;

        if(score > highScore){

            highScore = score;

            localStorage.setItem(
                "snakeHighScore",
                highScore
            );

            highScoreEl.textContent =
            highScore;
        }

        food = randomFood();

        if(speed > 50){
            speed -= 2;
        }

    }else{

        snake.pop();
    }
}

/* BACKGROUND */

function drawBackground(){

    ctx.fillStyle = "#111";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(
        let x=0;
        x<canvas.width;
        x+=gridSize
    ){

        for(
            let y=0;
            y<canvas.height;
            y+=gridSize
        ){

            ctx.strokeStyle =
            "rgba(255,255,255,0.05)";

            ctx.strokeRect(
                x,
                y,
                gridSize,
                gridSize
            );
        }
    }
}

/* GAME LOOP */

function gameLoop(){

    drawBackground();

    moveSnake();

    drawFood();

    drawSnake();

    if(gameRunning){

        setTimeout(()=>{

            requestAnimationFrame(gameLoop);

        },speed);
    }
}

/* GAME OVER */

function gameOver(){

    gameRunning = false;

    gameOverScreen.style.display =
    "flex";

    finalScore.textContent =
    "Your Score: " + score;
}

/* RESTART */

function restartGame(){

    snake = [{x:200,y:200}];

    direction = "right";

    food = randomFood();

    score = 0;

    speed = 120;

    scoreEl.textContent = score;

    gameOverScreen.style.display =
    "none";

    gameRunning = true;

    gameLoop();
}

/* CHANGE DIRECTION */

function changeDirection(newDir){

    if(
        newDir === "up" &&
        direction !== "down"
    ){
        direction = "up";
    }

    if(
        newDir === "down" &&
        direction !== "up"
    ){
        direction = "down";
    }

    if(
        newDir === "left" &&
        direction !== "right"
    ){
        direction = "left";
    }

    if(
        newDir === "right" &&
        direction !== "left"
    ){
        direction = "right";
    }
}

/* KEYBOARD */

document.addEventListener(
"keydown",
(e)=>{

    switch(e.key){

        case "ArrowUp":
        case "w":
            changeDirection("up");
            break;

        case "ArrowDown":
        case "s":
            changeDirection("down");
            break;

        case "ArrowLeft":
        case "a":
            changeDirection("left");
            break;

        case "ArrowRight":
        case "d":
            changeDirection("right");
            break;
    }
});

/* START GAME */

gameLoop();

</script>

</body>
</html>
